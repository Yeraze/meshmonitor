version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    reviewers:
      - "yeraze"
    labels:
      - "dependencies"
      - "npm"
    ignore:
      # TypeScript 7's native compiler drops the JS compiler API that
      # @typescript-eslint depends on, breaking lint:ci. Hold major bumps
      # until the tooling ecosystem ships TS7-native support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      development-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "vitest*"
          - "@testing-library/*"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "vitest*"
          - "@testing-library/*"
        update-types:
          - "patch"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    rebase-strategy: "auto"
    reviewers:
      - "yeraze"
    labels:
      - "dependencies"
      - "github-actions"

  # Enable security updates for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    rebase-strategy: "auto"
    reviewers:
      - "yeraze"
    labels:
      - "dependencies"
      - "docker"