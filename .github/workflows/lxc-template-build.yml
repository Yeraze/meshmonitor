name: Build LXC Template

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*.*.*'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 4.12.0 or latest)'
        required: false
        default: 'latest'

permissions:
  contents: write  # Required for uploading release assets

jobs:
  build-lxc-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        # No submodules needed here — build-lxc-template.sh clones the repo
        # directly into the container rootfs and handles submodules itself.
        # No Node.js setup needed — the script installs Node.js 24 via
        # NodeSource inside the container chroot, not on the CI runner.

      - name: Extract version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from tag (remove 'v' prefix if present)
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building LXC template version: $VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap git curl

      - name: Build LXC template
        run: |
          sudo ./lxc/build-lxc-template.sh "${{ steps.get_version.outputs.version }}"

      - name: List build artifacts
        run: |
          ls -lh lxc/build/
          echo ""
          echo "SHA256 Checksums:"
          cat lxc/build/*.sha256

      - name: Upload template as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: meshmonitor-lxc-template-${{ steps.get_version.outputs.version }}
          path: |
            lxc/build/*.tar.gz
            lxc/build/*.sha256
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          files: |
            lxc/build/*.tar.gz
            lxc/build/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup build directory
        if: always()
        run: |
          sudo rm -rf lxc/build/
