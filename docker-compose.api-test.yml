# Dedicated compose file for tests/test-api-exercise-all-backends.sh
#
# Uses test-scoped volume names and container names so the self-hosted CI
# runner can freely `docker compose down -v` without destroying the developer's
# live dev volumes (`meshmonitor_meshmonitor-sqlite-data` etc.).
#
# Kept structurally close to docker-compose.dev.yml so drift is easy to spot.
name: meshmonitor-api-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: meshmonitor-api-test-postgres
    profiles:
      - postgres
    ports:
      - "5442:5432"
    restart: unless-stopped
    volumes:
      - postgres-api-test-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=meshmonitor
      - POSTGRES_USER=meshmonitor
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-meshmonitor_dev}
      - TZ=America/New_York
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshmonitor -d meshmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  meshmonitor:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - meshmonitor:latest
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: meshmonitor-api-test-postgres-app
    profiles:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:3001"
      - "4415:4404"
    restart: unless-stopped
    volumes:
      - meshmonitor-api-test-postgres-data:/data
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://meshmonitor:meshmonitor_dev@postgres:5432/meshmonitor
      - SESSION_SECRET=qlskjerhqlwkjehrlqkwejh
      - BASE_URL=/meshmonitor
      - TZ=America/New_York
      - ALLOWED_ORIGINS=http://localhost:8085
      - TRUST_PROXY=1
      - COOKIE_SECURE=false
      - DISABLE_ANONYMOUS=${DISABLE_ANONYMOUS:-false}
      - ACCESS_LOG_ENABLED=true
      - ACCESS_LOG_PATH=/data/logs/access.log
      - ACCESS_LOG_FORMAT=combined
      - ENABLE_VIRTUAL_NODE=false
      # Point at loopback so the auto-created source fails fast with
      # ECONNREFUSED rather than spending ~30s per cycle on EHOSTUNREACH
      # trying to route to the developer's LAN Meshtastic node (192.168.1.100)
      # that is not reachable from the test container's Docker network.
      - MESHTASTIC_NODE_IP=127.0.0.1
      - MESHTASTIC_TCP_PORT=4403

  meshmonitor-sqlite:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - meshmonitor:latest
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: meshmonitor-api-test-sqlite
    profiles:
      - sqlite
    ports:
      - "8085:3001"
      - "4415:4404"
    restart: unless-stopped
    volumes:
      - meshmonitor-api-test-sqlite-data:/data
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/meshmonitor.db
      - SESSION_SECRET=qlskjerhqlwkjehrlqkwejh
      - BASE_URL=/meshmonitor
      - TZ=America/New_York
      - ALLOWED_ORIGINS=http://localhost:8085
      - TRUST_PROXY=1
      - COOKIE_SECURE=false
      - DISABLE_ANONYMOUS=${DISABLE_ANONYMOUS:-false}
      - ACCESS_LOG_ENABLED=true
      - ACCESS_LOG_PATH=/data/logs/access.log
      - ACCESS_LOG_FORMAT=combined
      - ENABLE_VIRTUAL_NODE=false
      # Point at loopback so the auto-created source fails fast with
      # ECONNREFUSED rather than spending ~30s per cycle on EHOSTUNREACH
      # trying to route to the developer's LAN Meshtastic node (192.168.1.100)
      # that is not reachable from the test container's Docker network.
      - MESHTASTIC_NODE_IP=127.0.0.1
      - MESHTASTIC_TCP_PORT=4403

  mysql:
    image: mysql:8
    container_name: meshmonitor-api-test-mysql
    profiles:
      - mysql
    ports:
      - "3317:3306"
    restart: unless-stopped
    volumes:
      - mysql-api-test-data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=meshmonitor
      - MYSQL_USER=meshmonitor
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-meshmonitor_dev}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_dev}
      - TZ=America/New_York
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  meshmonitor-mysql:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - meshmonitor:latest
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: meshmonitor-api-test-mysql-app
    profiles:
      - mysql
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8085:3001"
      - "4415:4404"
    restart: unless-stopped
    volumes:
      - meshmonitor-api-test-mysql-data:/data
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://meshmonitor:meshmonitor_dev@mysql:3306/meshmonitor
      - SESSION_SECRET=qlskjerhqlwkjehrlqkwejh
      - BASE_URL=/meshmonitor
      - TZ=America/New_York
      - ALLOWED_ORIGINS=http://localhost:8085
      - TRUST_PROXY=1
      - COOKIE_SECURE=false
      - DISABLE_ANONYMOUS=${DISABLE_ANONYMOUS:-false}
      - ACCESS_LOG_ENABLED=true
      - ACCESS_LOG_PATH=/data/logs/access.log
      - ACCESS_LOG_FORMAT=combined
      - ENABLE_VIRTUAL_NODE=false
      # Point at loopback so the auto-created source fails fast with
      # ECONNREFUSED rather than spending ~30s per cycle on EHOSTUNREACH
      # trying to route to the developer's LAN Meshtastic node (192.168.1.100)
      # that is not reachable from the test container's Docker network.
      - MESHTASTIC_NODE_IP=127.0.0.1
      - MESHTASTIC_TCP_PORT=4403

volumes:
  meshmonitor-api-test-postgres-data:
    driver: local
  meshmonitor-api-test-sqlite-data:
    driver: local
  meshmonitor-api-test-mysql-data:
    driver: local
  postgres-api-test-data:
    driver: local
  mysql-api-test-data:
    driver: local
